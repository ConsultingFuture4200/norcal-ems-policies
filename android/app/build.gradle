/**
 * Android app-level build.gradle configuration for Nor-Cal EMS Field Guide
 * 
 * Key customizations:
 * - noCompress for .pdf and .db files (they're pre-compressed or need direct access)
 * - ABI filters limited to ARM (phones only, no emulators in prod)
 * - ProGuard enabled for release
 */

apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

react {
    // React Native config
}

def enableProguardInReleaseBuilds = true

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "org.norcalems.fieldguide"

    defaultConfig {
        applicationId "org.norcalems.fieldguide"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Only build for ARM architectures (actual phones)
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    // CRITICAL: Don't compress PDFs and SQLite databases in assets
    // These need to be accessed directly by the app
    androidResources {
        noCompress "pdf", "db"
    }

    signingConfigs {
        debug {
            // Uses default debug keystore
        }
        // Uncomment and configure for release distribution:
        // release {
        //     storeFile file('norcal-ems-release.keystore')
        //     storePassword 'YOUR_PASSWORD'
        //     keyAlias 'norcal-ems'
        //     keyPassword 'YOUR_PASSWORD'
        // }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // For sideload: use debug signing until release keystore is configured
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
applyNativeModulesAppBuildGradle(project)
