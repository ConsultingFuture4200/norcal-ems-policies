<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: dark gradient -->
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg-dark)" />

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="200" fill="#EF5350" />

  <!-- Cross icon (EMS) -->
  <rect x="48" y="76" width="40" height="12" rx="4" fill="#EF5350" opacity="0.9" />
  <rect x="62" y="62" width="12" height="40" rx="4" fill="#EF5350" opacity="0.9" />

  <!-- Project name -->
  <text
    x="116"
    y="105"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="42"
    font-weight="700"
    fill="#f0f6fc"
    letter-spacing="-0.5"
  >Nor-Cal EMS Field Guide</text>

  <!-- Tagline -->
  <text
    x="116"
    y="140"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="17"
    font-weight="400"
    fill="#8b949e"
    letter-spacing="0.2"
  >Offline-first Android app · 200+ policies · Zero internet required</text>

  <!-- Subtle separator -->
  <line x1="116" y1="120" x2="700" y2="120" stroke="#30363d" stroke-width="1" />
</svg>
